app = 'spiderwolf-entourage'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'
  [build.args]
    VITE_SUPABASE_URL      = "https://wisfuxgwtboitorhdrof.supabase.co"
    VITE_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpc2Z1eGd3dGJvaXRvcmhkcm9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjE4MzYsImV4cCI6MjA5NDY5NzgzNn0.JNSlHp1Y5CJly5DDabbVmZNiYGFEmabaWjuU0Yr4RlY"

[env]
  DATABASE_URL = 'sqlite+aiosqlite:////data/entourage.db'
  PORT = '8000'
  WORKSPACE_DIR = '/data/workspaces'

[[mounts]]
  source = 'entourage_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = '10s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/health'

[checks]
  [checks.alive]
    port = 8000
    type = 'http'
    interval = '15s'
    timeout = '10s'
    grace_period = '1m0s'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
